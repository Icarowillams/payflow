name: PayFlow CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: payflow
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Dar permissão ao mvnw
        run: chmod +x payflow/mvnw

      - name: Build do projeto
        working-directory: ./payflow
        run: ./mvnw clean compile -B

      - name: Rodar testes
        working-directory: ./payflow
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/payflow
          SPRING_DATASOURCE_USERNAME: admin
          SPRING_DATASOURCE_PASSWORD: admin
          JWT_SECRET: ci-test-secret-key-muito-segura-2024
          JWT_EXPIRATION: 86400000
        run: ./mvnw test -B

      - name: Gerar relatório de testes
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Resultados dos Testes
          path: payflow/target/surefire-reports/*.xml
          reporter: java-junit

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: docker build -t payflow:latest ./payflow